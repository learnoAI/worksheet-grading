name = "worksheet-grading-api"
main = "src/worker/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Cron triggers removed when the queue-based grading dispatch loop was
# replaced by Cloudflare Workflows. Dispatch is now synchronous from
# /finalize via env.GRADING_WORKFLOW.create(); workflow steps own retries
# and orphan-recovery is no longer needed (workflows are durable + report
# back to /internal/grading-worker/jobs/:id/{complete,fail}).

# ── Cloudflare Workflows ─────────────────────────────────────────────────
# Cross-script binding to the GradingWorkflow class defined in the
# grading-consumer worker. Backend dispatch creates one workflow instance
# per grading job; the workflow drives the 3-tier LLM fallback chain.
[[workflows]]
binding = "GRADING_WORKFLOW"
name = "grading-workflow"
class_name = "GradingWorkflow"
script_name = "worksheet-grading-consumer"

# Account ID comes from CLOUDFLARE_ACCOUNT_ID in the shell env (see
# `.dev.vars.example`). Secrets are set with `wrangler secret put`.

# ── Bindings ───────────────────────────────────────────────────────────────
#
# Every production binding is commented out by default. Uncomment a block
# only after you have (a) created the resource in the Cloudflare dashboard,
# and (b) populated the matching id/name fields. `npm run worker:build`
# works without any bindings — it just won't be able to query the DB, read
# R2 files, or publish to queues.

# ── Hyperdrive (Postgres) ─────────────────────────────────────────────────
# Create with:
#   wrangler hyperdrive create worksheet-grading-pg \
#     --connection-string="postgres://user:pass@host:5432/db"
#
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<hyperdrive-id-from-dashboard>"
# localConnectionString = "postgresql://postgres:postgres@localhost:5432/saarthi_test?schema=public"

# ── R2 (Object Storage) ───────────────────────────────────────────────────
# Reuses the existing production bucket — matches R2_BUCKET_NAME in the
# Express backend so files written by the grading consumer stay readable.
#
# [[r2_buckets]]
# binding = "WORKSHEET_FILES"
# bucket_name = "worksheet-grading-files"

# ── Static variables ──────────────────────────────────────────────────────
# Non-secret config goes in [vars]; secrets (DB URL, API tokens, JWT
# secret) go through `wrangler secret put`. See DEPLOYMENT.md.
#
# [vars]
# NODE_ENV = "production"
# CORS_ORIGINS = "https://worksheet-grading-web.madhav-2ff.workers.dev,https://app.saarthi.ai"
# CF_API_BASE_URL = "https://api.cloudflare.com/client/v4"
# POSTHOG_HOST = "https://us.i.posthog.com"
# EXPRESS_FALLBACK_URL = "https://king-prawn-app-k2urh.ondigitalocean.app/worksheet-grading-backend"
# # Dispatch loop tunables (defaults in code: 20min stale window, 25 batch)
# GRADING_STALE_PROCESSING_MS = "1200000"
# GRADING_QUEUE_POLL_BATCH_SIZE = "25"

# ── Secrets (set via `wrangler secret put` — never in this file) ─────────
#   DATABASE_URL                    — Postgres URL (fallback when no
#                                      Hyperdrive binding; not needed in
#                                      production once Hyperdrive is live)
#   JWT_SECRET                      — matches the Express backend
#   GRADING_WORKER_TOKEN            — shared secret with the grading CF worker
#   WORKSHEET_CREATION_WORKER_TOKEN — shared secret with the PDF renderer
#   CF_ACCOUNT_ID                   — Cloudflare account (still used by
#                                      worksheet-generation queue paths)
#   CF_API_TOKEN                    — token with queues:write scope (still
#                                      used by worksheet-generation queue paths)
#   POSTHOG_API_KEY                 — only set when analytics is enabled
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#   R2_BUCKET_NAME, R2_ENDPOINT, R2_PUBLIC_BASE_URL
#                                   — needed by aws4fetch for presigned
#                                     upload URLs

# ── Staging environment ──────────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
# Backed by:
#   - DO Postgres database `worksheet_grading_hono_test` (separate from prod
#     `defaultdb`), via Hyperdrive 25a7b3a9cc28419b875c118202958715
#   - R2 bucket `worksheet-grading-files-staging`
#   - CF Queue `grading-fast-staging` (id 7e046369a51645158868e7f58b56f9e1)
[env.staging]
name = "worksheet-grading-api-staging"

[env.staging.vars]
NODE_ENV = "staging"
CORS_ORIGINS = "*"
CF_API_BASE_URL = "https://api.cloudflare.com/client/v4"

[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "25a7b3a9cc28419b875c118202958715"

[[env.staging.r2_buckets]]
binding = "WORKSHEET_FILES"
bucket_name = "worksheet-grading-files-staging"

# Cross-script Workflow binding — staging-suffixed name + script_name so
# instances stay isolated from prod.
[[env.staging.workflows]]
binding = "GRADING_WORKFLOW"
name = "grading-workflow-staging"
class_name = "GradingWorkflow"
script_name = "worksheet-grading-consumer-staging"
