name = "worksheet-grading-consumer"
main = "src/index.ts"
compatibility_date = "2026-02-14"

# Configure these in Cloudflare dashboard or via `wrangler secret put` (+ `wrangler deploy --var KEY:value` for non-secrets):
# - BACKEND_BASE_URL
# - BACKEND_WORKER_TOKEN
# - CF_AI_GATEWAY_ACCOUNT_ID
# - CF_AI_GATEWAY_TOKEN (optional; required only if the gateway has authentication enabled)
# - CF_AI_GATEWAY_ID (default: learnoai)
# - OCR_PROVIDER (default: workers-ai)
# - OCR_MODEL (default: @cf/google/gemma-4-26b-a4b-it)
# - OCR_API_KEY (optional; for workers-ai, defaults to CF_AI_GATEWAY_TOKEN if unset)
# - OCR_FALLBACK_PROVIDER / OCR_FALLBACK_MODEL / OCR_FALLBACK_API_KEY (optional; stage-specific fallback)
# - OCR_REASONING_EFFORT (default: low)
# - OCR_REQUEST_TIMEOUT_MS (default: 500000)
# - AI_GRADING_PROVIDER (default: workers-ai)
# - AI_GRADING_MODEL (default: @cf/google/gemma-4-26b-a4b-it)
# - AI_GRADING_API_KEY (optional; for workers-ai, defaults to CF_AI_GATEWAY_TOKEN if unset)
# - AI_GRADING_FALLBACK_PROVIDER / AI_GRADING_FALLBACK_MODEL / AI_GRADING_FALLBACK_API_KEY (optional; stage-specific fallback)
# - AI_GRADING_REASONING_EFFORT (default: low)
# - AI_GRADING_REQUEST_TIMEOUT_MS (default: 500000)
# - BOOK_GRADING_PROVIDER (default: workers-ai)
# - BOOK_GRADING_MODEL (default: @cf/google/gemma-4-26b-a4b-it)
# - BOOK_GRADING_API_KEY (optional; for workers-ai, defaults to CF_AI_GATEWAY_TOKEN if unset)
# - BOOK_GRADING_FALLBACK_PROVIDER / BOOK_GRADING_FALLBACK_MODEL / BOOK_GRADING_FALLBACK_API_KEY (optional; stage-specific fallback)
# - BOOK_GRADING_REASONING_EFFORT (default: low)
# - BOOK_GRADING_REQUEST_TIMEOUT_MS (default: 500000)
# - LLM_FALLBACK_PROVIDER / LLM_FALLBACK_MODEL / LLM_FALLBACK_API_KEY (optional; shared fallback)
# - LLM_PRIMARY_ATTEMPTS / LLM_FALLBACK_ATTEMPTS (default: 2 / 2)
# - GEMINI_API_KEY (optional; used for Google AI Studio fallback when a fallback API key is not set)
# - OPENROUTER_API_KEY (optional; used for OpenRouter provider/fallback when a provider API key is not set)
# - GEMINI_LIMITER_MIN_RPS (default: 5)
# - GEMINI_LIMITER_INITIAL_RPS (default: 30)
# - GEMINI_LIMITER_MAX_RPS (default: 120)
# - GEMINI_429_RETRY_BASE_DELAY_SECONDS (default: 30)
# - GEMINI_429_RETRY_MAX_DELAY_SECONDS (default: 900)
# - POSTHOG_API_KEY (optional; server-side event telemetry)
# - POSTHOG_HOST (optional; default: https://us.i.posthog.com)
# - HEARTBEAT_INTERVAL_MS (default: 60000)
# - FAST_MAX_PAGES (default: 4)

[vars]
CF_AI_GATEWAY_ACCOUNT_ID = "2ffbc97db67c45deb3098acd1f647ac0"
CF_AI_GATEWAY_ID = "learnoai"
OCR_PROVIDER = "workers-ai"
OCR_MODEL = "@cf/google/gemma-4-26b-a4b-it"
OCR_REASONING_EFFORT = "low"
OCR_REQUEST_TIMEOUT_MS = "500000"
AI_GRADING_PROVIDER = "workers-ai"
AI_GRADING_MODEL = "@cf/google/gemma-4-26b-a4b-it"
AI_GRADING_REASONING_EFFORT = "low"
AI_GRADING_REQUEST_TIMEOUT_MS = "500000"
BOOK_GRADING_PROVIDER = "workers-ai"
BOOK_GRADING_MODEL = "@cf/google/gemma-4-26b-a4b-it"
BOOK_GRADING_REASONING_EFFORT = "low"
BOOK_GRADING_REQUEST_TIMEOUT_MS = "500000"
LLM_FALLBACK_PROVIDER = "openrouter"
LLM_FALLBACK_MODEL = "google/gemma-4-26b-a4b-it"
LLM_PRIMARY_ATTEMPTS = "2"
LLM_FALLBACK_ATTEMPTS = "2"
GEMINI_LIMITER_INITIAL_RPS = "60"
GEMINI_LIMITER_MAX_RPS = "240"
GEMINI_LIMITER_RAMP_UP_SUCCESS_COUNT = "10"
GEMINI_LIMITER_RAMP_UP_MULTIPLIER = "1.12"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "worksheet-grading-files"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "worksheet-grading-assets"

[[durable_objects.bindings]]
name = "GEMINI_RATE_LIMITER"
class_name = "GeminiRateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GeminiRateLimiter"]

[[workflows]]
name = "grading-workflow"
binding = "GRADING_WORKFLOW"
class_name = "GradingWorkflow"

# Queue consumer kept active during cutover so any in-flight messages
# enqueued by the previous backend deploy can drain. Once the queue
# is empty post-deploy, this block + the queue resource itself are
# removed in a follow-up PR. New work is routed through the workflow
# above; backend dispatch no longer publishes here.
#
# CUTOVER MIXED STATE (deploy-window note for on-call):
# Pre-deploy queue messages still flow through this consumer, so any
# GradingJob row picked up via the legacy path will have
# `workflowInstanceId = null`. `recoverStuckJob` (in
# `backend/src/worker/routes/gradingJobs.ts`) intentionally keeps the
# heartbeat-based stale-recovery for jobs with null workflowInstanceId,
# so legacy in-flight jobs recover the same way they always did. Rows
# with `workflowInstanceId` set follow the workflow's own watchdog and
# are immune to the 20-min heartbeat cutoff. Don't be surprised by the
# temporary mixed state — it lasts only until the queue depth hits 0.
[[queues.consumers]]
queue = "grading-fast"
max_batch_size = 20
max_batch_timeout = 1
max_concurrency = 250
max_retries = 5
dead_letter_queue = "grading-fast-dlq"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# ─── Staging environment ─────────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
#
# Wrangler 4 does NOT inherit `[[r2_buckets]]` or `[[queues.consumers]]`
# from the top-level into env blocks, so each env must list its bindings
# in full. Top-level config above continues to apply when running
# `wrangler deploy` with no `--env` flag, i.e. prod deploys are unchanged.
#
# Staging differences from prod:
#   - queue:        grading-fast-staging        (separate; no prod overlap)
#   - IMAGES_BUCKET: worksheet-grading-files-staging
#   - ASSETS_BUCKET: worksheet-grading-assets   (read-only access; consumer
#                    never writes — verified via grep on .put/.delete)
#   - no DLQ        (failures retry max_retries times then drop; keeps
#                    staging traffic out of the prod grading-fast-dlq)
#   - lower concurrency caps to keep Gemini billing predictable during tests
[env.staging]
name = "worksheet-grading-consumer-staging"

# Wrangler 4 doesn't inherit `vars` either. Mirror the top-level so the
# consumer reads the same defaults; staging-specific overrides go below.
[env.staging.vars]
CF_AI_GATEWAY_ACCOUNT_ID = "2ffbc97db67c45deb3098acd1f647ac0"
# Staging now points at a dedicated gateway (`saarthi_test`) so workflow
# tier 1+2 (workers-ai gemma) and tier 3 (openrouter) traffic is isolated
# from prod's `learnoai` gateway. Created 2026-05-07 for the workflows
# migration smoke.
CF_AI_GATEWAY_ID = "saarthi_test"
# Staging override: the queue-consumer drain path still reads these
# OCR_*/AI_GRADING_*/BOOK_GRADING_* vars. The new GradingWorkflow
# hardcodes its three tiers and ignores them.
OCR_PROVIDER = "google-ai-studio"
OCR_MODEL = "gemini-3.1-flash-lite-preview"
OCR_REASONING_EFFORT = "low"
OCR_REQUEST_TIMEOUT_MS = "500000"
AI_GRADING_PROVIDER = "google-ai-studio"
AI_GRADING_MODEL = "gemini-3.1-flash-lite-preview"
AI_GRADING_REASONING_EFFORT = "low"
AI_GRADING_REQUEST_TIMEOUT_MS = "500000"
BOOK_GRADING_PROVIDER = "google-ai-studio"
BOOK_GRADING_MODEL = "gemini-3.1-flash-lite-preview"
BOOK_GRADING_REASONING_EFFORT = "low"
BOOK_GRADING_REQUEST_TIMEOUT_MS = "500000"
# Fallback also Gemini so the chain stays consistent. If primary
# rate-limits or 5xxs, fallback hits the same provider with the same
# key — not redundancy in the strict sense but it exercises the
# fallback code path during tests.
LLM_FALLBACK_PROVIDER = "google-ai-studio"
LLM_FALLBACK_MODEL = "gemini-3.1-flash-lite-preview"
LLM_PRIMARY_ATTEMPTS = "2"
LLM_FALLBACK_ATTEMPTS = "2"
# Lower RPS targets than prod so test traffic doesn't blow our Gemini
# free-tier quota during full-flow exercises.
GEMINI_LIMITER_INITIAL_RPS = "5"
GEMINI_LIMITER_MAX_RPS = "30"
GEMINI_LIMITER_RAMP_UP_SUCCESS_COUNT = "10"
GEMINI_LIMITER_RAMP_UP_MULTIPLIER = "1.12"

[[env.staging.r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "worksheet-grading-files-staging"

[[env.staging.r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "worksheet-grading-assets"

# Durable Object binding for the Gemini rate limiter. The new code at
# index.ts:382 calls env.GEMINI_RATE_LIMITER.idFromName(...) and crashes
# without this. The class itself ships with the script — the migration
# block at the top level applies to every env's deploy.
[[env.staging.durable_objects.bindings]]
name = "GEMINI_RATE_LIMITER"
class_name = "GeminiRateLimiter"

[[env.staging.workflows]]
name = "grading-workflow-staging"
binding = "GRADING_WORKFLOW"
class_name = "GradingWorkflow"

# Same drain rationale as prod (top-level): kept until staging queue
# empties post-deploy, then removed in follow-up.
[[env.staging.queues.consumers]]
queue = "grading-fast-staging"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 5
max_retries = 3
