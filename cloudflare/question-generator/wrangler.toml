name = "question-generator"
main = "src/index.ts"
compatibility_date = "2026-02-14"

# Secrets (set via `wrangler secret put`):
# - WORKSHEET_CREATION_WORKER_TOKEN
# - WORKSHEET_CREATION_BACKEND_BASE_URL

[ai]
binding = "AI"

[vars]
AI_GATEWAY_ID = "worksheet-generation"
WORKERS_AI_MODEL = "@cf/google/gemma-4-26b-a4b-it"

[[queues.consumers]]
queue = "question-generation"
max_batch_size = 5
max_batch_timeout = 5
max_concurrency = 50
max_retries = 5
dead_letter_queue = "question-generation-dlq"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# ─── Staging environment ─────────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
#
# Wrangler 4 does NOT inherit `[[queues.consumers]]` or `[ai]` bindings
# from the top-level into env blocks, so each env must list its bindings
# in full. Top-level config above continues to apply when running
# `wrangler deploy` with no `--env` flag, i.e. prod deploys are unchanged.
#
# Staging differences from prod:
#   - queue:    question-generation-staging   (separate; no prod overlap)
#   - no DLQ    (failures retry max_retries times then drop; keeps
#                staging traffic out of the prod question-generation-dlq)
#   - lower concurrency to keep Workers AI usage predictable in tests
#
# Workers AI binding is account-scoped, so the same model + gateway are
# reused across envs.
[env.staging]
name = "question-generator-staging"

[env.staging.ai]
binding = "AI"

[env.staging.vars]
AI_GATEWAY_ID = "worksheet-generation"
WORKERS_AI_MODEL = "@cf/google/gemma-4-26b-a4b-it"

[[env.staging.queues.consumers]]
queue = "question-generation-staging"
max_batch_size = 2
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3

[env.staging.observability]
[env.staging.observability.logs]
enabled = true
invocation_logs = true
