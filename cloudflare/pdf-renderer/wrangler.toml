name = "pdf-renderer"
main = "src/index.ts"
compatibility_date = "2026-02-14"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
# - WORKSHEET_CREATION_WORKER_TOKEN
# - WORKSHEET_CREATION_BACKEND_BASE_URL

# R2_PUBLIC_BASE_URL is the public origin (scheme + host, no trailing
# slash) for `PDF_BUCKET`. It MUST match the bound bucket — a mismatch
# silently serves 404s to students fetching their PDF. Update this in
# lockstep with any bucket swap.
[vars]
R2_PUBLIC_BASE_URL = "https://pub-c3c6a680b09a42b8aaa905a95ab0b07c.r2.dev"

browser = { binding = "BROWSER" }

[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "worksheet-grading-files"

[[queues.consumers]]
queue = "pdf-rendering"
max_batch_size = 2
max_batch_timeout = 10
max_concurrency = 100
max_retries = 3
dead_letter_queue = "pdf-rendering-dlq"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# ─── Staging environment ─────────────────────────────────────────────────
# Deploy with: wrangler deploy --env staging
#
# Wrangler 4 does NOT inherit `[[r2_buckets]]` or `[[queues.consumers]]`
# from the top-level into env blocks, so each env must list its bindings
# in full. Top-level config above continues to apply when running
# `wrangler deploy` with no `--env` flag, i.e. prod deploys are unchanged.
#
# Staging differences from prod:
#   - queue:      pdf-rendering-staging         (separate; no prod overlap)
#   - PDF_BUCKET: worksheet-grading-files-staging
#   - no DLQ      (failures retry max_retries times then drop; keeps
#                  staging traffic out of the prod pdf-rendering-dlq)
#   - lower concurrency caps to keep test pipelines predictable
[env.staging]
name = "pdf-renderer-staging"

# Staging currently reuses the prod r2.dev origin because the staging
# bucket (`worksheet-grading-files-staging`) does not yet have public
# access enabled. This preserves prior behavior — when staging gets its
# own public origin, swap this in and the bucket binding below in one
# commit.
[env.staging.vars]
R2_PUBLIC_BASE_URL = "https://pub-c3c6a680b09a42b8aaa905a95ab0b07c.r2.dev"

[env.staging.browser]
binding = "BROWSER"

[[env.staging.r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "worksheet-grading-files-staging"

[[env.staging.queues.consumers]]
queue = "pdf-rendering-staging"
max_batch_size = 1
max_batch_timeout = 10
max_concurrency = 5
max_retries = 3

[env.staging.observability]
[env.staging.observability.logs]
enabled = true
invocation_logs = true
